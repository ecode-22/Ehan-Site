<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV | Ehan Badenhorst</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <h1>Ehan B.</h1>
        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="skills.html">Skills</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="cv.html" class="active">CV</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <button class="theme-toggle" onclick="toggleTheme()">
            <span class="theme-icon">🌙</span>
            <span class="theme-text">Dark</span>
        </button>
    </nav>

    <section>
        <h2>Curriculum Vitae</h2>
        <span class="section-subtitle">Professional Resume</span>

        <div class="cv-container">
            <a href="Ehan CV .jpeg" target="_blank">
                <img src="Ehan CV .jpeg" alt="Ehan Badenhorst Professional CV" class="cv-img">
            </a>
            <div style="margin-top: 2rem;">
                <a href="Ehan CV .jpeg" download class="btn btn-primary">Download CV</a>
                <a href="contact.html" class="btn btn-secondary">Get In Touch</a>
            </div>
        </div>
    </section>

    <footer>
        &copy; 2026 Ehan Badenhorst | All Rights Reserved
    </footer>

    <script src="features.js"></script>
    <script>
        window.addEventListener('scroll', function() {
            const nav = document.querySelector('nav');
            if (window.scrollY > 50) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            document.querySelector('.theme-icon').textContent = isDark ? '☀️' : '🌙';
            document.querySelector('.theme-text').textContent = isDark ? 'Light' : 'Dark';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-theme');
            document.querySelector('.theme-icon').textContent = '☀️';
            document.querySelector('.theme-text').textContent = 'Light';
        }
    </script>
</body>

</html>
