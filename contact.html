<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Ehan Badenhorst</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <nav>
        <h1>Ehan B.</h1>
        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="skills.html">Skills</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="cv.html">CV</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
        <button class="theme-toggle" onclick="toggleTheme()">
            <span class="theme-icon">🌙</span>
            <span class="theme-text">Dark</span>
        </button>
    </nav>

    <section>
        <h2>Get In Touch</h2>
        <span class="section-subtitle">Let's Build Something Great Together</span>

        <div class="contact-layout">
            <div class="contact-sidebar">
                <div class="contact-info-card">
                    <h3><i class="fa-solid fa-envelope" style="color: var(--primary); margin-right: 10px;"></i> Email</h3>
                    <p><a href="mailto:badenhorstehan2@gmail.com">badenhorstehan2@gmail.com</a></p>
                </div>

                <div class="contact-info-card">
                    <h3><i class="fa-brands fa-linkedin" style="color: var(--primary); margin-right: 10px;"></i> LinkedIn</h3>
                    <p><a href="https://www.linkedin.com/in/ehan-badenhorst-b7841b229/" target="_blank">Connect on LinkedIn</a></p>
                </div>

                <div class="contact-info-card">
                    <h3><i class="fa-brands fa-github" style="color: var(--primary); margin-right: 10px;"></i> GitHub</h3>
                    <p><a href="https://github.com/ecode-22" target="_blank">Follow My Work</a></p>
                </div>



                <div class="contact-main">
                    <form action="https://formspree.io/f/movnrdbk" method="POST" class="contact-form">
                        <input type="text" name="name" placeholder="Your Name" required>
                        <input type="email" name="email" placeholder="Your Email Address" required>
                        <input type="text" name="subject" placeholder="Subject">
                        <textarea name="message" placeholder="How can I help you?" rows="6" required></textarea>
                        <button type="submit" class="btn btn-primary" style="width: 100%; margin: 0;">Send Message</button>
                    </form>
                </div>
            </div>
            <div>

            </div>
        </div>
    </section>

    <footer>
        &copy; 2026 Ehan Badenhorst | Stellenbosch, South Africa
    </footer>

    <script src="features.js"></script>
    <script>
        window.addEventListener('scroll', function() {
            const nav = document.querySelector('nav');
            if (window.scrollY > 50) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            document.querySelector('.theme-icon').textContent = isDark ? '☀️' : '🌙';
            document.querySelector('.theme-text').textContent = isDark ? 'Light' : 'Dark';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-theme');
            document.querySelector('.theme-icon').textContent = '☀️';
            document.querySelector('.theme-text').textContent = 'Light';
        }
    </script>
</body>

</html>
