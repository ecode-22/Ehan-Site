<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Ehan Badenhorst</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <nav>
        <h1>Ehan B.</h1>
        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="skills.html">Skills</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="cv.html">CV</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <section>
        <h2>Get In Touch</h2>
        <span class="section-subtitle">Let's build something great together</span>

        <div class="intro-container" style="align-items: flex-start; gap: 4rem;">
            <div class="contact-sidebar">
                <div class="card" style="margin-bottom: 1.5rem; border-left: 5px solid var(--primary);">
                    <h3 style="margin-top: 0;"><i class="fa-solid fa-envelope" style="color: var(--primary); margin-right: 10px;"></i> Email</h3>
                    <p><a href="mailto:badenhorstehan2@gmail.com" style="text-decoration: none; color: var(--text-main);">badenhorstehan2@gmail.com</a></p>
                </div>

                <div class="card" style="margin-bottom: 1.5rem; border-left: 5px solid var(--primary);">
                    <h3 style="margin-top: 0;"><i class="fa-brands fa-linkedin" style="color: var(--primary); margin-right: 10px;"></i> LinkedIn</h3>
                    <p><a href="https://www.linkedin.com/in/ehan-badenhorst-b7841b229/" target="_blank" style="text-decoration: none; color: var(--text-main);">View Profile</a></p>
                </div>

                <div class="card" style="border-left: 5px solid var(--primary);">
                    <h3 style="margin-top: 0;"><i class="fa-brands fa-github" style="color: var(--primary); margin-right: 10px;"></i> GitHub</h3>
                    <p><a href="https://github.com/ecode-22" style="text-decoration: none; color: var(--text-main);">Follow My Work</a></p>
                </div>
            </div>

            <div class="contact-main">
                <form action="https://formspree.io/f/movnrdbk" method="POST" class="contact-form" style="max-width: 100%; margin: 0;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <input type="text" name="name" placeholder="Full Name" required>
                        <input type="email" name="email" placeholder="Email Address" required>
                    </div>
                    <input type="text" name="subject" placeholder="Subject">
                    <textarea name="message" placeholder="How can I help you?" rows="6" required></textarea>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        &copy; 2026 Ehan Badenhorst | Stellenbosch, South Africa
    </footer>
</body>

</html>
